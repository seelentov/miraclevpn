<!DOCTYPE html>
<html lang="ru">
{{template "head.html"}}

<body>
    {{template "header.html"}}
    <div class="wrapper">
        <main>
            <div class="container">
                <form action="/login" method="post">
                    <div class="input">
                        <label for="token">Введите ключ:</label>
                        <input type="password" placeholder="" type="token" id="token" name="token" required />
                    </div>
                    <p class="text text-description">UID можно получить у <a target="_blank" href="https://t.me/miiboostauth_bot">телеграм бота</a>.</p>
                    <input type="redirect_to" id="redirect_to" name="redirect_to" hidden value="{{.RedirectTo}}" />
                    <br />
                    <br />
                    <div class="center">
                        <button class="button">Войти</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    {{template "footer.html"}}
    {{template "script.html"}}
</body>

</html>
