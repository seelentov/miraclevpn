<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Host Monitor</title>
</head>

<body>
    <table border="1">
        <thead>
            <tr>
                <th>Host</th>
                <th>Count</th>
                <th>Received</th>
                <th>Sent</th>
                <th>Rate</th>
            </tr>
        </thead>
        <tbody>
            {{range .Hosts}}
            <tr>
                <td>
                    <a href="/{{.Host}}">{{.Host}}</a>
                </td>
                <td>{{.Count}}</td>
                <td>{{formatBytes .BytesReceived}}</td>
                <td>{{formatBytes .BytesSent}}</td>
                <td>{{formatBytes .Rate}}</td>
            </tr>
            {{end}}
        </tbody>
    </table>
</body>

</html>
